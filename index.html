    <script>
        // --- EXISTING DOM INPUTS & SETUP ---
        const productNameInput = document.getElementById('product-name');
        const upcField = document.getElementById('upc-field');
        const upcSearchBtn = document.getElementById('upc-search-btn');
        const boxCostInput = document.getElementById('box-cost');
        const piecesInput = document.getElementById('pieces');
        const stockLevelInput = document.getElementById('stock-level');
        const flatExtraCostInput = document.getElementById('flat-extra-cost');
        const extraCostType = document.getElementById('extra-cost-type');
        const marginSlider = document.getElementById('margin-slider');
        const marginValue = document.getElementById('margin-value');
        const pctTypeSelector = document.getElementById('pct-type');
        const unitCostDisplay = document.getElementById('unit-cost-display');
        const retailPriceDisplay = document.getElementById('retail-price-display');
        const historyList = document.getElementById('history-list');
        const historyCount = document.getElementById('history-count');
        const historyTitle = document.getElementById('history-title');
        const userSelector = document.getElementById('user-selector');
        const langSelector = document.getElementById('lang-selector');
        const modeSelector = document.getElementById('mode-selector');
        const btnCommit = document.getElementById('btn-commit');
        const btnClear = document.getElementById('btn-clear');

        let html5QrScanner = null;
        let currentMode = localStorage.getItem('jb_margin_mode') || 'pro';
        
        // --- ORDER LIST STATE ---
        let currentUser = localStorage.getItem('jb_margin_active_user') || 'Default User';
        let orderItems = JSON.parse(localStorage.getItem(`jb_order_list_${currentUser}`)) || [];
        window.isScanningForOrder = false;

        // --- UPDATED SCANNER LOGIC ---
        function onScanSuccess(decodedText, decodedResult) {
            if (window.isScanningForOrder) {
                // ADD TO ORDER LIST
                orderItems.push({ upc: decodedText, date: new Date().toLocaleTimeString() });
                localStorage.setItem(`jb_order_list_${currentUser}`, JSON.stringify(orderItems));
                renderOrderList();
                if (navigator.vibrate) navigator.vibrate(200); // Feedback
                // DO NOT closeScanner() here, keeping camera active
            } else {
                // STANDARD INVENTORY LOGIC
                upcField.value = decodedText;
                upcSearchBtn.classList.remove('hidden');
                closeScanner();
            }
        }

        function startOrderScanner() {
            window.isScanningForOrder = true;
            startScanner();
        }

        function closeScanner() {
            window.isScanningForOrder = false; // Reset state
            const scannerWrapper = document.getElementById('pro-scanner-wrapper');
            if (html5QrScanner) {
                html5QrScanner.clear().then(() => {
                    document.getElementById('scanner-container').classList.add('hidden');
                    scannerWrapper.classList.add('hidden');
                }).catch(err => console.error(err));
            }
        }

        // --- ORDER LIST UI ---
        function renderOrderList() {
            const listContainer = document.getElementById('order-list-items');
            listContainer.innerHTML = orderItems.length === 0 ? "Order list empty." : "";
            orderItems.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = "flex justify-between bg-slate-50 dark:bg-slate-800 p-2 rounded";
                div.innerHTML = `<span>${item.upc}</span> <button onclick="removeFromOrder(${index})" class="text-red-500">✕</button>`;
                listContainer.appendChild(div);
            });
        }

        function removeFromOrder(index) {
            orderItems.splice(index, 1);
            localStorage.setItem(`jb_order_list_${currentUser}`, JSON.stringify(orderItems));
            renderOrderList();
        }

        function clearOrderList() {
            if(confirm("Clear Order List?")) {
                orderItems = [];
                localStorage.setItem(`jb_order_list_${currentUser}`, JSON.stringify(orderItems));
                renderOrderList();
            }
        }

        function exportOrderToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,UPC,Time\n" + orderItems.map(i => `${i.upc},${i.date}`).join("\n");
            const link = document.createElement("a");
            link.setAttribute("href", encodeURI(csvContent));
            link.setAttribute("download", `Order_List_${currentUser}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // --- RETAIN ALL YOUR PREVIOUS FUNCTIONS (initUsers, calculate, etc.) HERE ---
        // ... (Keep all your existing translation and calculation functions here)

        // Initialization
        initTheme();
        initAppMode();
        initUsers();
        renderOrderList();
    </script>
