<!DOCTYPE html>
<html lang="en" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JBMargin Calculadora</title>
    
    <!-- Tailwind CSS CDN (with dark mode class support) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    
    <!-- HTML5-QRCode Scanner Library CDN -->
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        #reader {
            border: none !important;
        }
        #reader img {
            display: none !important;
        }
        #reader button {
            background-color: #2563eb !important;
            color: white !important;
            padding: 8px 16px !important;
            border-radius: 6px !important;
            font-weight: 600 !important;
            border: none !important;
            margin-top: 10px !important;
            cursor: pointer !important;
        }
        #reader select {
            padding: 6px 12px !important;
            border-radius: 6px !important;
            border: 1px solid #d1d5db !important;
            margin-top: 5px !important;
        }
        /* Dark mode overrides for scanner select elements */
        .dark #reader select {
            background-color: #1e293b !important;
            color: #f1f5f9 !important;
            border-color: #334155 !important;
        }
    </style>
</head>
<body class="bg-slate-100 dark:bg-slate-950 min-h-screen flex flex-col justify-between font-sans transition-colors duration-200">

    <!-- Main Container -->
    <div class="w-full max-w-md mx-auto bg-white dark:bg-slate-900 p-6 rounded-b-2xl shadow-md flex-grow transition-colors duration-200">
        
        <!-- Header -->
        <div class="flex items-center justify-between border-b dark:border-slate-800 pb-4 mb-6">
            <h1 class="text-xl font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                📊 JBMargin <span class="text-xs bg-blue-100 text-blue-800 dark:bg-blue-900/40 dark:text-blue-300 px-2 py-0.5 rounded-full font-semibold">v3.1</span>
            </h1>
            <!-- Dark Mode Toggle Button -->
            <button onclick="toggleTheme()" id="theme-btn" class="p-2 rounded-lg bg-slate-100 hover:bg-slate-200 dark:bg-slate-800 dark:hover:bg-slate-700 transition-colors text-lg" title="Toggle Dark/Light Mode">
                🌙
            </button>
        </div>

        <!-- Scanner Interface (Hidden by Default) -->
        <div id="scanner-container" class="hidden bg-slate-50 dark:bg-slate-850 p-4 rounded-xl mb-6 border border-slate-200 dark:border-slate-800">
            <div class="flex justify-between items-center mb-2">
                <span class="text-sm font-semibold text-slate-700 dark:text-slate-300">Scan Barcode (UPC/EAN)</span>
                <button onclick="closeScanner()" class="text-xs bg-red-100 text-red-600 dark:bg-red-950/50 dark:text-red-400 px-2 py-1 rounded-md font-bold hover:bg-red-200 dark:hover:bg-red-900/50">
                    ✕ Close Scanner
                </button>
            </div>
            <div id="reader" class="w-full overflow-hidden rounded-lg"></div>
        </div>

        <!-- Calculator Form -->
        <div class="space-y-4">
            
            <!-- Product Name / Notes -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-1">Product Name / Note (Optional)</label>
                <input type="text" id="product-name" placeholder="e.g. Blue Pen 12ct" class="w-full px-3 py-2 border dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- UPC Barcode Fields -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-1">Product UPC / ID</label>
                <div class="flex gap-2">
                    <input type="text" id="upc-field" placeholder="Scanned UPC will appear here" class="w-full px-3 py-2 border dark:border-slate-800 rounded-lg bg-slate-50 dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <button onclick="startScanner()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 rounded-lg flex items-center gap-1 font-bold text-sm shadow active:scale-95 transition-transform">
                        📷 <span>Scan</span>
                    </button>
                </div>
            </div>

            <!-- Box Cost -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-1">Box Cost ($)</label>
                <input type="number" id="box-cost" step="0.01" placeholder="0.00" class="w-full px-4 py-2.5 border dark:border-slate-800 rounded-lg text-lg bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>

            <!-- Pieces per Box -->
            <div>
                <label class="block text-sm font-semibold text-slate-600 dark:text-slate-400 mb-1">Pieces per Box</label>
                <input type="number" id="pieces" placeholder="e.g. 12" class="w-full px-4 py-2.5 border dark:border-slate-800 rounded-lg text-lg bg-white dark:bg-slate-800 text-slate-800 dark:text-slate-100 placeholder-slate-400 dark:placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium">
            </div>

            <!-- Target Margin -->
            <div>
                <div class="flex justify-between items-center mb-1">
                    <label class="block text-sm font-semibold text-slate-600 dark:text-slate-400">Target Margin (%)</label>
                    <span id="margin-value" class="text-sm font-bold text-blue-600 dark:text-blue-400">35%</span>
                </div>
                <input type="range" id="margin-slider" min="1" max="99" value="35" class="w-full h-2 bg-slate-200 dark:bg-slate-700 rounded-lg appearance-none cursor-pointer accent-blue-600">
            </div>

        </div>

        <!-- Calculations Summary Card -->
        <div class="mt-6 bg-slate-50 dark:bg-slate-800/50 p-5 rounded-xl border border-slate-200 dark:border-slate-800/80 space-y-4">
            <div class="flex justify-between items-center border-b dark:border-slate-800 pb-2">
                <span class="text-slate-500 dark:text-slate-400 text-sm font-medium">Unit Cost</span>
                <span id="unit-cost-display" class="text-lg font-bold text-slate-800 dark:text-slate-200">$0.00</span>
            </div>

            <div class="flex justify-between items-center">
                <div>
                    <span class="text-slate-800 dark:text-slate-200 font-bold text-sm block">Suggested Retail</span>
                    <span class="text-slate-400 dark:text-slate-500 text-xs font-normal">Selling price with chosen margin</span>
                </div>
                <span id="retail-price-display" class="text-3xl font-extrabold text-blue-600 dark:text-blue-400">$0.00</span>
            </div>
        </div>

        <!-- Action Buttons -->
        <div class="mt-5 flex gap-3">
            <button onclick="clearAll()" class="w-1/3 bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-300 py-3 rounded-lg font-bold text-sm transition-colors">
                Clear
            </button>
            <button onclick="saveCurrentCalculation()" class="w-2/3 bg-green-600 hover:bg-green-700 text-white py-3 rounded-lg font-bold text-sm shadow transition-all active:scale-95">
                💾 Save to History
            </button>
        </div>

    </div>

    <!-- Saved History List Container -->
    <div class="w-full max-w-md mx-auto mt-6 bg-white dark:bg-slate-900 p-6 rounded-t-2xl shadow-md transition-colors duration-200">
        <div class="flex justify-between items-center border-b dark:border-slate-800 pb-3 mb-4">
            <h2 class="text-md font-bold text-slate-800 dark:text-slate-100 flex items-center gap-2">
                📁 Saved History (<span id="history-count">0</span>)
            </h2>
            <button onclick="clearHistory()" class="text-xs text-red-500 hover:text-red-700 font-bold">
                Clear History
            </button>
        </div>

        <!-- List Elements -->
        <div id="history-list" class="space-y-3 max-h-60 overflow-y-auto pr-1">
            <p class="text-xs text-slate-400 dark:text-slate-500 text-center py-4">No saved products yet. Scan and save to build a list.</p>
        </div>
    </div>

    <!-- PWA Offline Note -->
    <div class="text-center p-4 text-xs text-slate-400 dark:text-slate-600">
        Offline Ready • Auto-Saves Locally
    </div>

    <script>
        const productNameInput = document.getElementById('product-name');
        const upcField = document.getElementById('upc-field');
        const boxCostInput = document.getElementById('box-cost');
        const piecesInput = document.getElementById('pieces');
        const marginSlider = document.getElementById('margin-slider');
        const marginValue = document.getElementById('margin-value');
        
        const unitCostDisplay = document.getElementById('unit-cost-display');
        const retailPriceDisplay = document.getElementById('retail-price-display');
        const historyList = document.getElementById('history-list');
        const historyCount = document.getElementById('history-count');
        const themeBtn = document.getElementById('theme-btn');

        let html5QrScanner = null;
        let savedItems = JSON.parse(localStorage.getItem('jb_margin_history')) || [];

        // --- THEME ENGINE (DARK MODE) ---
        function initTheme() {
            const savedTheme = localStorage.getItem('jb_margin_theme');
            if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
                themeBtn.textContent = '☀️';
            } else {
                document.documentElement.classList.remove('dark');
                themeBtn.textContent = '🌙';
            }
        }

        function toggleTheme() {
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark');
                localStorage.setItem('jb_margin_theme', 'light');
                themeBtn.textContent = '🌙';
            } else {
                document.documentElement.classList.add('dark');
                localStorage.setItem('jb_margin_theme', 'dark');
                themeBtn.textContent = '☀️';
            }
        }

        // Dynamic Calculations
        function calculate() {
            const boxCost = parseFloat(boxCostInput.value) || 0;
            const pieces = parseInt(piecesInput.value) || 0;
            const marginPercent = parseFloat(marginSlider.value) / 100;

            marginValue.textContent = `${marginSlider.value}%`;

            if (boxCost > 0 && pieces > 0) {
                const unitCost = boxCost / pieces;
                unitCostDisplay.textContent = `$${unitCost.toFixed(2)}`;

                if (marginPercent < 1) {
                    const retailPrice = unitCost / (1 - marginPercent);
                    retailPriceDisplay.textContent = `$${retailPrice.toFixed(2)}`;
                } else {
                    retailPriceDisplay.textContent = '$0.00';
                }
            } else {
                unitCostDisplay.textContent = '$0.00';
                retailPriceDisplay.textContent = '$0.00';
            }
        }

        // Save active configuration to local storage history
        function saveCurrentCalculation() {
            const upc = upcField.value.trim() || "No UPC";
            const name = productNameInput.value.trim() || "Unnamed Product";
            const boxCost = parseFloat(boxCostInput.value) || 0;
            const pieces = parseInt(piecesInput.value) || 0;
            const margin = marginSlider.value;
            const unitCost = unitCostDisplay.textContent;
            const retailPrice = retailPriceDisplay.textContent;

            if (boxCost <= 0 || pieces <= 0) {
                alert("Please enter a valid Box Cost and Pieces count before saving.");
                return;
            }

            const newItem = {
                id: Date.now(),
                name,
                upc,
                boxCost: boxCost.toFixed(2),
                pieces,
                margin,
                unitCost,
                retailPrice
            };

            savedItems.unshift(newItem); // Adds new items to top of list
            localStorage.setItem('jb_margin_history', JSON.stringify(savedItems));
            
            renderHistory();
            
            // Clear inputs to prep for next item
            productNameInput.value = '';
            upcField.value = '';
            boxCostInput.value = '';
            piecesInput.value = '';
            marginSlider.value = 35;
            calculate();
        }

        // Render History List UI
        function renderHistory() {
            historyCount.textContent = savedItems.length;

            if (savedItems.length === 0) {
                historyList.innerHTML = `<p class="text-xs text-slate-400 dark:text-slate-500 text-center py-4">No saved products yet. Scan and save to build a list.</p>`;
                return;
            }

            historyList.innerHTML = '';
            savedItems.forEach(item => {
                const itemDiv = document.createElement('div');
                itemDiv.className = "bg-slate-50 dark:bg-slate-800/40 p-3 rounded-lg border border-slate-200 dark:border-slate-800 text-xs relative flex justify-between items-center transition-colors duration-200";
                itemDiv.innerHTML = `
                    <div class="space-y-0.5">
                        <div class="font-bold text-slate-800 dark:text-slate-200 text-sm">${item.name}</div>
                        <div class="text-slate-400 dark:text-slate-500 text-[10px]">UPC: <span class="font-mono text-slate-600 dark:text-slate-400">${item.upc}</span></div>
                        <div class="text-slate-500 dark:text-slate-400">Box Cost: $${item.boxCost} | Pcs: ${item.pieces} | Margin: ${item.margin}%</div>
                    </div>
                    <div class="flex items-center gap-3">
                        <div class="text-right">
                            <span class="text-slate-400 dark:text-slate-500 text-[10px] block">Retail price</span>
                            <span class="text-blue-600 dark:text-blue-400 font-bold text-sm">${item.retailPrice}</span>
                        </div>
                        <button onclick="deleteItem(${item.id})" class="text-red-500 hover:text-red-700 bg-red-50 dark:bg-red-950/20 p-1.5 rounded-full font-bold ml-2">
                            🗑️
                        </button>
                    </div>
                `;
                historyList.appendChild(itemDiv);
            });
        }

        // Delete item from list
        window.deleteItem = function(id) {
            savedItems = savedItems.filter(item => item.id !== id);
            localStorage.setItem('jb_margin_history', JSON.stringify(savedItems));
            renderHistory();
        }

        // Clear All History database
        window.clearHistory = function() {
            if (confirm("Are you sure you want to clear your entire saved scan history?")) {
                savedItems = [];
                localStorage.removeItem('jb_margin_history');
                renderHistory();
            }
        }

        // Action: Clean up inputs
        function clearAll() {
            productNameInput.value = '';
            upcField.value = '';
            boxCostInput.value = '';
            piecesInput.value = '';
            marginSlider.value = 35;
            calculate();
            closeScanner();
        }

        // --- SCANNING ENGINE LOGIC ---
        function startScanner() {
            const scannerContainer = document.getElementById('scanner-container');
            scannerContainer.classList.remove('hidden');

            if (!html5QrScanner) {
                html5QrScanner = new Html5QrcodeScanner(
                    "reader", 
                    { 
                        fps: 15, 
                        qrbox: { width: 280, height: 150 },
                        aspectRatio: 1.777778,
                        rememberLastUsedCamera: true,
                        supportedScanTypes: [
                            Html5QrcodeScanType.SCAN_TYPE_CAMERA,
                            Html5QrcodeScanType.SCAN_TYPE_FILE
                        ]
                    },
                    false
                );
            }

            html5QrScanner.render(onScanSuccess, onScanError);
        }

        function onScanSuccess(decodedText, decodedResult) {
            upcField.value = decodedText;
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }
            closeScanner();
        }

        function onScanError(err) {}

        function closeScanner() {
            if (html5QrScanner) {
                html5QrScanner.clear().then(() => {
                    document.getElementById('scanner-container').classList.add('hidden');
                }).catch(error => {
                    console.error("Failed to clear scanner: ", error);
                    document.getElementById('scanner-container').classList.add('hidden');
                });
            } else {
                document.getElementById('scanner-container').classList.add('hidden');
            }
        }

        // Initialize lists and events
        boxCostInput.addEventListener('input', calculate);
        piecesInput.addEventListener('input', calculate);
        marginSlider.addEventListener('input', calculate);
        
        // Initial Theme and History Render on Load
        initTheme();
        renderHistory();
    </script>
</body>
</html>
